site_name: DEBT Manager — migracja danych stagingowych
site_description: Dokumentacja techniczna migracji danych stagingowych do produkcji w systemie DEBT Manager
site_url: https://oskar-bialek-bakk.github.io/intrum-migration-docs/

theme:
  name: material
  language: pl
  logo: images/bakk-logo.svg
  favicon: images/bakk-favicon.png
  font:
    text: Source Sans 3
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Przełącz na tryb jasny
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Przełącz na tryb ciemny

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: pl
  - drawio

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: docs
  - tables
  - attr_list
  - md_in_html

nav:
  - Strona główna: index.md
  - Założenia:
    - zalozenia/index.md
    - Wstęp: zalozenia/wstep.md
    - Poziomy walidacji: zalozenia/poziomy-walidacji.md
    - Architektura pipeline'u: zalozenia/architektura-pipelinu.md
  - Przygotowanie danych:
    - przygotowanie-danych/index.md
    - Kolejność zasilania tabel: przygotowanie-danych/kolejnosc-zasilania-tabel.md
    - Walidacje: przygotowanie-danych/walidacje.md
    - Mapowanie tabel staging → prod: przygotowanie-danych/mapowanie-tabel.md
  - Przebieg migracji:
    - przebieg-migracji/index.md
    - Migracja: przebieg-migracji/migracja.md
    - Postępowanie po błędach: przebieg-migracji/postepowanie-po-bledach.md
    - Raport pomigracyjny: przebieg-migracji/raport-pomigracyjny.md
  - Odbiór: odbior/odbior-danych.md
  - Słowniki:
    - slowniki/index.md
    - Reguły walidacji: slowniki/reguly-walidacji.md
    - Kolumny audytowe i konwencje: slowniki/kolumny-audytowe.md
